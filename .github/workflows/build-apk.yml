name: Build Release APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'

      - name: Get Flutter dependencies for User App
        run: cd handyman_user_flutter_v11.14.3 && flutter pub get

      - name: Get Flutter dependencies for Provider App
        run: cd provider_flutter_v11.14.3 && flutter pub get

      - name: Create User Keystore
        env:
          USER_KEYSTORE_B64: ${{ secrets.USER_KEYSTORE }}
        run: |
          set -e
          decode_ok=0
          USER_KEYSTORE_PATH="user_keystore.jks"

          if [ -n "$USER_KEYSTORE_B64" ]; then
            if printf '%s' "$USER_KEYSTORE_B64" \
              | sed -E 's#^data:.*;base64,##' \
              | tr -d '\r\n\t ' \
              | tr '_-' '/+' \
              | base64 --decode --ignore-garbage > "$USER_KEYSTORE_PATH" 2>/dev/null; then
              if [ -s "$USER_KEYSTORE_PATH" ]; then
                if keytool -list \
                  -keystore "$USER_KEYSTORE_PATH" \
                  -storepass 'Antoine@2025' \
                  -alias 'user_key' >/dev/null 2>&1; then
                  decode_ok=1
                  echo "User keystore decoded from USER_KEYSTORE secret."
                else
                  echo "Decoded USER keystore is invalid for configured alias/password; fallback will be generated."
                  rm -f "$USER_KEYSTORE_PATH"
                fi
              fi
            fi
          fi

          if [ "$decode_ok" -ne 1 ]; then
            echo "Generating fallback user keystore for CI."
            rm -f "$USER_KEYSTORE_PATH"
            keytool -genkeypair -v \
              -keystore "$USER_KEYSTORE_PATH" \
              -storepass 'Antoine@2025' \
              -alias 'user_key' \
              -keypass 'Antoine@2025' \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=CI User, OU=Mobile, O=Service, L=Paris, ST=IDF, C=FR"
          fi

      - name: Create Provider Keystore
        env:
          PROVIDER_KEYSTORE_B64: ${{ secrets.PROVIDER_KEYSTORE }}
        run: |
          set -e
          decode_ok=0
          PROVIDER_KEYSTORE_PATH="provider_keystore.jks"

          if [ -n "$PROVIDER_KEYSTORE_B64" ]; then
            if printf '%s' "$PROVIDER_KEYSTORE_B64" \
              | sed -E 's#^data:.*;base64,##' \
              | tr -d '\r\n\t ' \
              | tr '_-' '/+' \
              | base64 --decode --ignore-garbage > "$PROVIDER_KEYSTORE_PATH" 2>/dev/null; then
              if [ -s "$PROVIDER_KEYSTORE_PATH" ]; then
                if keytool -list \
                  -keystore "$PROVIDER_KEYSTORE_PATH" \
                  -storepass 'Antoine@2025' \
                  -alias 'provider_key' >/dev/null 2>&1; then
                  decode_ok=1
                  echo "Provider keystore decoded from PROVIDER_KEYSTORE secret."
                else
                  echo "Decoded PROVIDER keystore is invalid for configured alias/password; fallback will be generated."
                  rm -f "$PROVIDER_KEYSTORE_PATH"
                fi
              fi
            fi
          fi

          if [ "$decode_ok" -ne 1 ]; then
            echo "Generating fallback provider keystore for CI."
            rm -f "$PROVIDER_KEYSTORE_PATH"
            keytool -genkeypair -v \
              -keystore "$PROVIDER_KEYSTORE_PATH" \
              -storepass 'Antoine@2025' \
              -alias 'provider_key' \
              -keypass 'Antoine@2025' \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=CI Provider, OU=Mobile, O=Service, L=Paris, ST=IDF, C=FR"
          fi

      - name: Build User APK Release
        working-directory: handyman_user_flutter_v11.14.3
        run: |
          flutter build apk --release \
            --build-name=11.14.3 \
            --build-number=108

      - name: Build Provider APK Release
        working-directory: provider_flutter_v11.14.3
        run: |
          flutter build apk --release \
            --build-name=11.14.2 \
            --build-number=99

      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: handyman-user-release-apk
          path: handyman_user_flutter_v11.14.3/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Provider APK
        uses: actions/upload-artifact@v4
        with:
          name: handyman-provider-release-apk
          path: provider_flutter_v11.14.3/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: actions/create-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false