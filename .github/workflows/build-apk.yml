name: Build Release APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.38.4'
        channel: 'stable'

    - name: Get Flutter dependencies for User App
      run: cd handyman_user_flutter_v11.14.3 && flutter pub get

    - name: Get Flutter dependencies for Provider App
      run: cd provider_flutter_v11.14.3 && flutter pub get

    - name: Create User Keystore
      env:
        USER_KEYSTORE_B64: ${{ secrets.USER_KEYSTORE }}
      run: |
        if [ -z "$USER_KEYSTORE_B64" ]; then
          echo "USER_KEYSTORE secret is empty"
          exit 1
        fi

        printf '%s' "$USER_KEYSTORE_B64" \
          | sed -E 's#^data:.*;base64,##' \
          | tr -d '\r\n\t ' \
          | tr '_-' '/+' \
          | base64 --decode --ignore-garbage > user_keystore.jks

        test -s user_keystore.jks

    - name: Create Provider Keystore
      env:
        PROVIDER_KEYSTORE_B64: ${{ secrets.PROVIDER_KEYSTORE }}
      run: |
        if [ -z "$PROVIDER_KEYSTORE_B64" ]; then
          echo "PROVIDER_KEYSTORE secret is empty"
          exit 1
        fi

        printf '%s' "$PROVIDER_KEYSTORE_B64" \
          | sed -E 's#^data:.*;base64,##' \
          | tr -d '\r\n\t ' \
          | tr '_-' '/+' \
          | base64 --decode --ignore-garbage > provider_keystore.jks

        test -s provider_keystore.jks

    - name: Build User APK Release
      working-directory: handyman_user_flutter_v11.14.3
      run: |
        flutter build apk --release \
          --build-name=11.14.3 \
          --build-number=108

    - name: Build Provider APK Release
      working-directory: provider_flutter_v11.14.3
      run: |
        flutter build apk --release \
          --build-name=11.14.2 \
          --build-number=99

    - name: Upload User APK
      uses: actions/upload-artifact@v4
      with:
        name: handyman-user-release-apk
        path: handyman_user_flutter_v11.14.3/build/app/outputs/flutter-apk/app-release.apk

    - name: Upload Provider APK
      uses: actions/upload-artifact@v4
      with:
        name: handyman-provider-release-apk
        path: provider_flutter_v11.14.3/build/app/outputs/flutter-apk/app-release.apk

    - name: Create Release
      uses: actions/create-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
